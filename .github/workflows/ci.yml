name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore CryptographicBillOfMaterials.slnx

      - name: Build (warnings as errors)
        run: dotnet build CryptographicBillOfMaterials.slnx -c Release --no-restore -warnaserror

      - name: Test
        run: dotnet test CryptographicBillOfMaterials.slnx -c Release --no-build --verbosity normal
